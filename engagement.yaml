# ENGAGEMENT — single source of truth
#
# This file is consumed by BOTH the heuristic scorer in discord.py AND the
# haiku ambiguity classifier prompt in session.py. Keep them aligned by
# editing only this file. ENGAGEMENT.md is a generated mirror of the
# `classifier_prompt` block below.
#
# Schema:
#   thresholds:        score cutoffs used by _score_message
#   recency_seconds:   how long an active thread keeps the recency boost
#   address_levels:    score → address level (consumed by FUSED-CORE Budget Throttle)
#   scoring:           per-signal score deltas
#   noise_tokens:      ≤2-word messages composed of these are dropped pre-score
#   domains:           module → keyword list (replaces hand-curated dict in discord.py)
#   classifier_prompt: text injected into the haiku ambiguity classifier

thresholds:
  hard_pass: 0.85       # at or above → engage without haiku
  haiku_floor: 0.4      # below → drop; between → escalate to haiku

recency_seconds: 450

address_levels:
  high: 0.85            # @mention or score >= 0.85
  moderate: 0.4         # 0.4 <= score < 0.85
  # below 0.4 = low (dropped before reaching session anyway)

scoring:
  reply_to_bot: 1.0
  recency_active: 0.3      # bot spoke in channel within recency_seconds window
  domain_match: 0.4
  domain_match_in_context: 0.3
  conversational_in_thread: 0.4  # question/directive in active thread — with recency (0.3) this clears haiku_floor alone
  name_mentioned: 0.85     # name in text without @mention — clears hard_pass, bypasses haiku
  follow_up_after_tool_use: 0.3  # same user, within window of a bot tool-use turn

follow_up_window_seconds: 120

