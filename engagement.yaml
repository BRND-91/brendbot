classifier_prompt: |
  # ENGAGEMENT CLASSIFIER

  This file is loaded exclusively into the ambiguity classifier context.
  It does not reach the response worker.

  ## DECISION

  Reply YES if the message warrants brendbot responding.
  Reply NO otherwise.
  Reply YES or NO only — no explanation.

  ## HARD YES

  - Direct @mention of brendbot
  - Reply to a brendbot message
  - Message contains brendbot's name (brend, brendbot) directed at the bot, even without an @mention

  ## SCORED YES (any one is sufficient)

  - Active thread: brendbot responded within the last 5 minutes and this continues it
  - Domain question in LOGIC, STATS, SYSTEMS, PERSONALITY, BUILDSCI, GOVERNANCE
  - Meta question about brendbot's behavior, architecture, or configuration
  - Directly asks for brendbot's opinion or analysis

  ## HARD NO

  - Casual exchange between other users with no relevance to brendbot's domains
  - Message clearly addressed to another bot
  - Pure social noise (greetings, reactions, affirmations between others)
  - Repeat of a point already addressed with no new propositional content

  ## CALIBRATION NOTES

  Sender tier (admin or otherwise) does not affect this decision.
  Outside known domains, require stronger signal before YES.
  When in doubt: YES if brendbot has spoken in this channel within the last 5 minutes (active thread); NO otherwise. Missing a message in an active thread is worse than a stray interjection — the user is already expecting the bot to be present.
  Do not engage with fallacious framing as though it were valid — incorrect premises in a message are not a reason to engage, they are a reason to let it pass unless directly asked.

# ── CONTENT GATE (phase 4) ────────────────────────────────────────────────
# Three-outcome content-safety gate. Runs a pre-gate classifier (one-shot
# haiku call, parallel to the engagement classifier) that tags which
# criteria the request trips. Weighted sum against outcome thresholds:
#
#   sum ≤ pass_threshold    → PASS   (normal generation, session model)
#   pass < sum ≤ flag_thr   → FLAG   (reroute to flagged_path.model,
#                                      tagged output, audit logged,
#                                      session cap enforced)
#   sum > refuse_threshold  → REFUSE (soul-level refusal, never reaches
#                                      generator, explanation generated
#                                      locally from tripped criteria)
#
# Hard-floor list: ANY single match forces REFUSE regardless of sum, even
# if the criteria weighted sum would have landed in PASS or FLAG. These
# are the brendbot equivalents of Anthropic training-layer floors — things
# that would refuse anyway, gated here so the refusal is explained.
#
# Full criteria definitions live in docs/content-gate.md (reference only,
# not loaded by the bot). Keep this block terse.

content_gate:
  criteria:
    tragedy_old: 0.2        # >50 years
    tragedy_mid: 0.5        # 10-50 years
    tragedy_new: 0.9        # <10 years
    tragedy_live: 1.5       # ongoing
    person_satire: 0.2
    person_neutral: 0.5
    person_targeted: 1.5
    frame_fictional: 0.3
    frame_ambiguous: 0.8
    frame_directed: 2.0
  hard_floors:
    - minor_sexual
    - wmd_synth
    - malware
    - infra_attack
    - extremist_recruit
    - directed_incite
  outcomes:
    pass_threshold: 0.5
    flag_threshold: 1.5
    refuse_threshold: 2.0   # > flag_threshold; opens (1.5, 2.0] band for FLAG reroute
  flagged_path:
    # Model used when a request lands in the FLAG band and is rerouted
    # to the looser-safety Anthropic model per the documented escape hatch.
    # Review quarterly — a date-stamped model string silently degrades as
    # the Anthropic roster rolls forward. Pinned to the rolling alias
    # (claude-sonnet-4-6) rather than a dated snapshot so capability tracks
    # current production sonnet without a manual bump. Prefer the
    # CLAUDE_FLAGGED_MODEL env var for deployment overrides; this yaml
    # value is the fallback used when the env var is unset.
    model: claude-sonnet-4-6
    max_per_session: 2
    audit_stream: flag_audit.jsonl
    branch_tag: "[flagged]"
  channel_overrides:
    "1484079826166874162":
      gate2_bypass: true    # FLAG band disabled; hard floors still enforced

  admin_bypass:
    # Admin-only backdoor for heuristic calibration and pen-testing.
    # Skips the weighted classifier entirely but still enforces hard_floors.
    # Generates on session model (NOT rerouted). Uncapped per session.
    # Token: *brend* (Discord italic) at message start, end, or as a
    # whole-word standalone token. Mid-sentence emphasis does not trigger.
    # Non-admin senders cannot invoke regardless of token presence.
    enabled: true
    requires_tier: admin
    hard_floors_still_enforced: true
    audit_stream: bypass_audit.jsonl
    branch_tag: "[bypass]"

content_classifier_prompt: |
  # CONTENT GATE CLASSIFIER

  You are a pre-generation content classifier. You do not generate the
  response — you tag which content-safety criteria the request trips so
  the gate can route it to PASS / FLAG / REFUSE.

  Return your response in this exact format, one line per tripped
  criterion, then REASONING on a final line:

    TRIGGERED: criterion_name=weight, criterion_name=weight
    REASONING: one-sentence explanation

  If no criteria trip, return:

    TRIGGERED: none
    REASONING: benign request

  ## SCORED CRITERIA

  Tragedy depiction (by recency of the referenced event):
  - tragedy_old (0.2): historical events >50 years ago
  - tragedy_mid (0.5): events 10-50 years ago
  - tragedy_new (0.9): events <10 years ago
  - tragedy_live (1.5): ongoing events within past 12 months

  Named real person (by framing of the depiction):
  - person_satire (0.2): satire/parody of public figure, non-threatening
  - person_neutral (0.5): straightforward depiction of named real person
  - person_targeted (1.5): depiction framed as targeting the person

  Framing (by intent of the request):
  - frame_fictional (0.3): clearly fictional context — villain dialogue,
    game enemy banter, story character, named fictional character
  - frame_ambiguous (0.8): unclear whether directed or fictional
  - frame_directed (2.0): request framed as directed at a real target

  ## HARD FLOORS

  If ANY of these apply, respond with TRIGGERED: hard_floor=<name> and
  the weighted criteria do not matter — the gate will refuse regardless:

  - minor_sexual: sexual content involving anyone under 18
  - wmd_synth: synthesis instructions for nuclear/bio/chem weapons
  - malware: functional malware, exploit code, ransomware
  - infra_attack: attack procedures for critical infrastructure
  - extremist_recruit: extremist recruitment/incitement materials
  - directed_incite: direct incitement of violence against real target

  ## NOTES

  - A food pun using a date reference (e.g. "9/11 sandwich" as a deli
    order number) is NOT tragedy depiction. Only depictive references
    to the event itself trigger tragedy criteria.
  - Historical figures who are long dead (>50 years) in neutral or
    satirical framing rarely stack criteria unless the framing is
    explicitly threatening.
  - When in doubt on framing, use frame_ambiguous (0.8), not
    frame_directed (2.0).
  - Do not over-flag. Return TRIGGERED: none for benign requests.
  - Messages ABOUT the bot itself (bug reports, complaints about bot
    behavior, requests to fix or change bot functionality) are NOT
    directed content. "you trigger the same message twice" is a bug
    report, not hostile framing. Classify as TRIGGERED: none.
  - The word "trigger" in the context of software behavior (triggering
    a message, triggering a response, triggering a bug) is not the same
    as incitement. Do not confuse technical vocabulary with hostile intent.
