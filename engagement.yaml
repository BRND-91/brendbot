# Domain keywords drive substring-matching for module routing. LOGIC,
# STATS, SYSTEMS, PERSONALITY, GOVERNANCE blocks were removed — their
# content lived in model training weights, not in out-of-distribution
# module data. Keeping keyword blocks for those domains would match
# messages to nonexistent modules. BUILDSCI and IMAGEGEN remain because
# both carry genuinely OOD material the model cannot reproduce from weights.
